<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="text" id="Nome" placeholder="Digite o nome...">
    
    <select id="cor">
        <option value="blue">Baixo</option>
        <option value="orange">Médio</option> <option value="red">Urgente</option>
    </select>

    <button class="btn btn-dark rounded-pill px-3" type="button" onclick="mostrar()">Ok</button>
    <button onclick="mostrar()">Ok</button>

    <ul id="lista">
        </ul>

    <script>
    function mostrar() {
        
        let valor = document.getElementById("Nome").value;
        let cor = document.getElementById("cor").value;

        let p = document.createElement("li");
        p.innerHTML = "Prioridade: " + valor;
        p.style.color = cor;
        
        let ul = document.getElementById("lista");
        ul.appendChild(p);

        // Limpa o campo após adicionar
        document.getElementById("nome").value = "";
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
